name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  large-file-detection:
    name: Large File Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for large files
        run: |
          # Check for files larger than 10MB
          LARGE_FILES=$(git ls-tree -r -l HEAD | awk -v size="10485760" '
            $4+0 > size {
              path = $0
              sub(/^[^\t]*\t/, "", path)
              printf "%s\t%s\n", $4, path
            }
          ')
          
          if [ -n "$LARGE_FILES" ]; then
            echo "❌ Error: Found large files (>10MB):"
            echo "$LARGE_FILES" | while IFS=$'\t' read -r SIZE NAME; do
              SIZE_MB=$(awk "BEGIN { printf \"%.2f\", $SIZE / 1048576 }")
              echo "  - $NAME (${SIZE_MB} MB)"
            done
            exit 1
          fi
          
          echo "✅ No large files found (>10MB)"

      - name: Check for binary files
        run: |
          # List of suspicious binary extensions
          BINARY_EXTENSIONS='\.(exe|dll|so|dylib|bin|dat|pyc|class|o|a|lib|zip|tar|gz|rar|7z|iso|img|dmg|pkg|deb|rpm|msi)$'
          
          BINARY_FILES=$(git ls-tree -r HEAD --name-only | grep -iE "$BINARY_EXTENSIONS" || true)
          
          if [ ! -z "$BINARY_FILES" ]; then
            echo "⚠️  Warning: Found potential binary files:"
            echo "$BINARY_FILES" | while read -r file; do
              echo "  - $file"
            done
            echo ""
            echo "Review these files to ensure they should be committed."
          else
            echo "✅ No suspicious binary files found"
          fi

      - name: Check line count per file
        run: |
          # Check for files with more than 500 lines (same threshold as pre-commit)
          MAX_LINES=500
          LARGE_FILES=$(find . -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/.next/*" \
            -not -path "*/dist/*" \
            -not -path "*/__tests__/*" \
            -exec wc -l {} \; 2>/dev/null | \
            awk -v max="$MAX_LINES" '$1 > max {printf "  - %s (%d lines)\n", $2, $1}' | \
            head -20)
          
          if [ ! -z "$LARGE_FILES" ]; then
            echo "⚠️  Warning: Found large files (>$MAX_LINES lines):"
            echo "$LARGE_FILES"
            echo ""
            echo "Consider breaking these files into smaller modules."
          else
            echo "✅ All files are reasonably sized (<$MAX_LINES lines)"
          fi

  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Run linter
        run: pnpm run check

      - name: Run typecheck
        run: pnpm run typecheck || true

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test
