name: Error to Insight Pipeline

on:
  schedule:
    # Run daily at 5:00 AM AWST (9:00 PM UTC)
    - cron: '0 21 * * *'
  
  workflow_dispatch:

env:
  POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
  POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  error-to-insight:
    name: Create Issues from Errors
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch errors from PostHog
        id: fetch-errors
        run: |
          echo "🔍 Fetching recent errors from PostHog..."
          
          # Get errors from last 24 hours using PostHog API
          # Note: This requires POSTHOG_API_KEY and POSTHOG_PROJECT_ID secrets
          
          if [ -z "$POSTHOG_API_KEY" ] || [ -z "$POSTHOG_PROJECT_ID" ]; then
            echo "⚠️ PostHog credentials not configured, skipping error fetch"
            echo "errors_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Query PostHog for recent $exception events
          # Using events API to get errors from last 24 hours
          RESPONSE=$(curl -s -X GET \
            "https://us.posthog.com/api/projects/$POSTHOG_PROJECT_ID/events/?event=$exception&after=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)" \
            -H "Authorization: Bearer $POSTHOG_API_KEY" \
            -H "Content-Type: application/json" 2>/dev/null || echo "{}")
          
          # Parse errors (simplified - production would need more sophisticated parsing)
          ERROR_COUNT=$(echo "$RESPONSE" | jq -r '.results | length' 2>/dev/null || echo "0")
          
          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "Found $ERROR_COUNT error events in last 24 hours"
            echo "$RESPONSE" | jq -r '.results[] | select(.event == "$exception") | {message: .properties.$exception_message, type: .properties.$exception_type, location: .properties.location}' > errors.json
            echo "errors_found=true" >> $GITHUB_OUTPUT
            echo "error_count=$ERROR_COUNT" >> $GITHUB_OUTPUT
          else
            echo "No new errors found"
            echo "errors_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Analyze and deduplicate errors
        id: analyze
        if: steps.fetch-errors.outputs.errors_found == 'true'
        run: |
          echo "📊 Analyzing errors..."
          
          # Group errors by message to find patterns
          echo "Error patterns found:"
          cat errors.json | jq -r '.message' | sort | uniq -c | sort -rn | head -10
          
          # Get top errors to create issues for
          cat errors.json | jq -r '.message' | sort | uniq -c | sort -rn | head -5 | while read -r line; do
            count=$(echo "$line" | awk '{print $1}')
            message=$(echo "$line" | cut -d' ' -f2-)
            
            # Only create issues for errors occurring multiple times
            if [ "$count" -gt 5 ]; then
              echo "error: $message" >> errors-to-process.txt
              echo "count: $count" >> errors-to-process.txt
              echo "---" >> errors-to-process.txt
            fi
          done
          
          if [ -f "errors-to-process.txt" ]; then
            echo "errors_to_process=true" >> $GITHUB_OUTPUT
          else
            echo "errors_to_process=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub issues
        if: steps.analyze.outputs.errors_to_process == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read errors to process
            const errorContent = fs.readFileSync('errors-to-process.txt', 'utf8');
            const errorBlocks = errorContent.split('---').filter(block => block.trim());
            
            for (const block of errorBlocks) {
              const lines = block.trim().split('\n');
              const errorMessage = lines.find(l => l.startsWith('error:'))?.replace('error: ', '');
              const count = lines.find(l => l.startsWith('count:'))?.replace('count: ', '');
              
              if (!errorMessage) continue;
              
              // Check if issue already exists
              const { data: existingIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'error-insight',
                state: 'open'
              });
              
              // Simple deduplication - check if similar error exists
              const similarIssue = existingIssues.find(issue => 
                issue.title.includes(errorMessage.substring(0, 50))
              );
              
              if (!similarIssue) {
                // Create new issue
                const titlePrefix = '🐛 Error Insight: ';
                const titleSuffix = errorMessage.length > 80 ? '...' : '';
                const title = titlePrefix + errorMessage.substring(0, 80) + titleSuffix;
                
                const occurrencesLine = '**Occurrences** ' + count + ' times in last 24 hours';
                const dashboardUrl = 'https://us.posthog.com/project/' + process.env.POSTHOG_PROJECT_ID + '/events';
                const errorSearchUrl = 'https://us.posthog.com/project/' + process.env.POSTHOG_PROJECT_ID + '/events?event=$exception&properties.$exception_message=' + encodeURIComponent(errorMessage);
                
                // Build body content using string concatenation to avoid YAML parsing issues
                let bodyContent = '## Automated Error Report\n\n';
                bodyContent += '**Error Message**\n<pre><code>' + errorMessage + '</code></pre>\n\n';
                bodyContent += occurrencesLine + '\n\n';
                bodyContent += '**Source** PostHog error tracking\n\n';
                bodyContent += '### Recommended Actions:\n';
                bodyContent += '1. [ ] Investigate root cause\n';
                bodyContent += '2. [ ] Check related logs in PostHog\n';
                bodyContent += '3. [ ] Determine if user-facing or internal\n';
                bodyContent += '4. [ ] Assign priority based on impact\n';
                bodyContent += '5. [ ] Fix and monitor\n\n';
                bodyContent += '**Resources**\n';
                bodyContent += '- [PostHog Dashboard](' + dashboardUrl + ')\n';
                bodyContent += '- [View similar errors](' + errorSearchUrl + ')\n\n';
                bodyContent += '*This issue was automatically created by the error-to-insight pipeline.*\n\n';
                bodyContent += '---\n\n';
                bodyContent += '**Next Steps**\n';
                bodyContent += '- Add additional context as you investigate\n';
                bodyContent += '- Update labels (bug, critical, etc.)\n';
                bodyContent += '- Link to any PRs that fix this issue';
                
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: title,
                  body: bodyContent,
                  labels: ['error-insight', 'automated', 'needs-investigation']
                });
                
                console.log('Created issue for error: ' + errorMessage.substring(0, 50) + '...');
              } else {
                console.log('Issue already exists for: ' + errorMessage.substring(0, 50) + '...');
              }
            }

      - name: Summary
        run: |
          echo "## Error-to-Insight Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.fetch-errors.outputs.errors_found }}" == "true" ]; then
            echo "__Total errors found:__ ${{ steps.fetch-errors.outputs.error_count }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            if [ "${{ steps.analyze.outputs.errors_to_process }}" == "true" ]; then
              echo "✅ High-frequency errors have been converted to GitHub issues" >> $GITHUB_STEP_SUMMARY
            else
              echo "ℹ️ No high-frequency errors requiring issues" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "✅ No new errors detected" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Check PostHog dashboard for detailed error analysis" >> $GITHUB_STEP_SUMMARY
